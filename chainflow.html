<!doctype html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>
      Chainflow • Responsive Web3 Prototype • Clarity • Trust • Simplified
    </title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600&display=swap");
      body {
        font-family: "Inter", sans-serif;
      }
      .logo-font {
        font-family: "Space Grotesk", sans-serif;
      }
      .neon-purple {
        text-shadow: 0 0 15px #c084fc;
      }
      .glass {
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(12px);
      }
      .chain-dot {
        animation: pulse 2s infinite;
      }
      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.6;
        }
      }
    </style>
  </head>
  <body class="bg-zinc-950 text-zinc-100 min-h-screen flex flex-col">
    <!-- MOBILE HEADER / TOP BAR -->
    <header
      class="lg:hidden bg-zinc-900 border-b border-zinc-700 px-4 py-3 flex items-center justify-between sticky top-0 z-50"
    >
      <div class="flex items-center gap-3">
        <button id="mobile-menu-btn" class="text-2xl">
          <i class="fa-solid fa-bars"></i>
        </button>
        <div class="flex items-center gap-2">
          <div
            class="w-8 h-8 bg-gradient-to-br from-violet-500 to-fuchsia-500 rounded-xl flex items-center justify-center text-xl font-bold logo-font neon-purple"
          >
            C
          </div>
          <h1 class="text-2xl font-semibold logo-font tracking-tighter">
            Chainflow
          </h1>
        </div>
      </div>
      <button
        onclick="connectWallet()"
        class="bg-gradient-to-r from-violet-600 to-fuchsia-600 hover:from-violet-700 hover:to-fuchsia-700 px-4 py-2 rounded-xl text-sm font-medium flex items-center gap-2"
      >
        <i class="fa-solid fa-wallet"></i> Connect
      </button>
    </header>

    <div class="flex flex-1 overflow-hidden">
      <!-- SIDEBAR - responsive: hidden on mobile, slide-in overlay -->
      <aside
        id="sidebar"
        class="fixed inset-y-0 left-0 z-50 w-72 bg-zinc-900 border-r border-zinc-700 transform -translate-x-full lg:translate-x-0 lg:static lg:inset-auto transition-transform duration-300 ease-in-out flex flex-col"
      >
        <div
          class="p-6 border-b border-zinc-700 flex items-center justify-between lg:justify-start gap-3"
        >
          <div class="flex items-center gap-3">
            <div
              class="w-8 h-8 bg-gradient-to-br from-violet-500 to-fuchsia-500 rounded-xl flex items-center justify-center text-xl font-bold logo-font neon-purple"
            >
              C
            </div>
            <h1 class="text-3xl font-semibold logo-font tracking-tighter">
              Chainflow
            </h1>
          </div>
          <button id="close-sidebar" class="lg:hidden text-2xl">
            <i class="fa-solid fa-xmark"></i>
          </button>
        </div>

        <div class="p-4">
          <button
            onclick="connectWallet()"
            class="w-full bg-gradient-to-r from-violet-600 to-fuchsia-600 hover:from-violet-700 hover:to-fuchsia-700 py-3 rounded-2xl flex items-center justify-center gap-2 font-semibold text-sm lg:text-base"
          >
            <i class="fa-solid fa-wallet"></i>
            <span id="wallet-btn">Connect Wallet</span>
          </button>
          <select
            id="network"
            class="mt-3 w-full bg-zinc-800 border border-zinc-600 rounded-xl px-3 py-2 text-sm"
          >
            <option>Multi-Chain • Intent Mode</option>
            <option selected>Chain Abstraction ON</option>
          </select>
        </div>

        <nav class="flex-1 px-3 py-2 overflow-y-auto space-y-1">
          <a
            href="#"
            onclick="switchTab(0)"
            class="nav-link flex items-center gap-3 px-4 py-3 hover:bg-zinc-800 rounded-xl font-medium"
            ><i class="fa-solid fa-house w-5"></i> Dashboard</a
          >
          <a
            href="#"
            onclick="switchTab(1)"
            class="nav-link flex items-center gap-3 px-4 py-3 hover:bg-zinc-800 rounded-xl"
            ><i class="fa-solid fa-arrow-right-arrow-left w-5"></i> Swap /
            Bridge</a
          >
          <a
            href="#"
            onclick="switchTab(2)"
            class="nav-link flex items-center gap-3 px-4 py-3 hover:bg-zinc-800 rounded-xl"
            ><i class="fa-solid fa-coins w-5"></i> Stake</a
          >
          <a
            href="#"
            onclick="switchTab(3)"
            class="nav-link flex items-center gap-3 px-4 py-3 hover:bg-zinc-800 rounded-xl"
            ><i class="fa-solid fa-chart-pie w-5"></i> Portfolio</a
          >
          <a
            href="#"
            onclick="switchTab(4)"
            class="nav-link flex items-center gap-3 px-4 py-3 hover:bg-zinc-800 rounded-xl"
            ><i class="fa-solid fa-compass w-5"></i> Explore</a
          >
          <a
            href="#"
            onclick="switchTab(5)"
            class="nav-link flex items-center gap-3 px-4 py-3 hover:bg-zinc-800 rounded-xl"
            ><i class="fa-solid fa-gavel w-5"></i> Govern</a
          >

          <div class="pt-6 px-4 text-xs uppercase tracking-wider text-zinc-500">
            Trust & Tools
          </div>
          <button
            onclick="showProofModal()"
            class="flex items-center gap-3 px-4 py-2 text-emerald-400 hover:bg-zinc-800 w-full rounded-xl text-sm justify-start"
          >
            <i class="fa-solid fa-shield-halved"></i> Verify Transaction
          </button>
        </nav>

        <div class="p-4 border-t border-zinc-700 text-xs space-y-3">
          <div class="flex gap-2">
            <button
              onclick="toggleDark()"
              class="flex-1 py-2 bg-zinc-800 rounded-xl text-xs"
            >
              Theme
            </button>
            <button class="flex-1 py-2 bg-zinc-800 rounded-xl text-xs">
              Notifications
            </button>
          </div>
        </div>
      </aside>

      <!-- MAIN CONTENT AREA -->
      <div class="flex-1 flex flex-col min-w-0">
        <!-- DESKTOP HEADER -->
        <header
          class="hidden lg:flex h-16 border-b border-zinc-700 bg-zinc-900 px-6 items-center justify-between sticky top-0 z-40"
        >
          <div class="flex items-center gap-6">
            <input
              id="search"
              placeholder="Search token, tx, or intent..."
              class="w-80 bg-zinc-800 border border-zinc-600 rounded-3xl px-5 py-2 text-sm focus:outline-none focus:border-violet-500"
            />
          </div>

          <div class="flex items-center gap-4">
            <button
              onclick="showConnectModal()"
              class="flex items-center gap-2 px-5 py-2 bg-zinc-800 hover:bg-zinc-700 rounded-2xl text-sm"
            >
              <span class="text-emerald-400">Connect</span>
            </button>
            <button class="p-2 hover:bg-zinc-700 rounded-xl relative">
              <i class="fa-solid fa-bell"></i>
              <span
                class="absolute -top-1 -right-1 bg-rose-500 text-[10px] px-1.5 rounded-full"
                >3</span
              >
            </button>
          </div>
        </header>

        <!-- TAB NAVIGATION - horizontal scroll on mobile -->
        <div
          class="border-b border-zinc-700 bg-zinc-900 px-4 lg:px-6 overflow-x-auto"
        >
          <div class="flex whitespace-nowrap">
            <button
              onclick="switchTab(0)"
              id="tab0"
              class="tab-btn px-5 lg:px-6 py-3 border-b-2 border-violet-500 font-medium text-sm lg:text-base"
            >
              Dashboard
            </button>
            <button
              onclick="switchTab(1)"
              id="tab1"
              class="tab-btn px-5 lg:px-6 py-3 text-zinc-400 hover:text-zinc-200 text-sm lg:text-base"
            >
              Flows
            </button>
            <button
              onclick="switchTab(2)"
              id="tab2"
              class="tab-btn px-5 lg:px-6 py-3 text-zinc-400 hover:text-zinc-200 text-sm lg:text-base"
            >
              Stake
            </button>
            <button
              onclick="switchTab(3)"
              id="tab3"
              class="tab-btn px-5 lg:px-6 py-3 text-zinc-400 hover:text-zinc-200 text-sm lg:text-base"
            >
              Portfolio
            </button>
            <button
              onclick="switchTab(4)"
              id="tab4"
              class="tab-btn px-5 lg:px-6 py-3 text-zinc-400 hover:text-zinc-200 text-sm lg:text-base"
            >
              Discover
            </button>
            <button
              onclick="switchTab(5)"
              id="tab5"
              class="tab-btn px-5 lg:px-6 py-3 text-zinc-400 hover:text-zinc-200 text-sm lg:text-base"
            >
              DAO
            </button>
          </div>
        </div>

        <!-- MAIN CONTENT -->
        <main class="flex-1 overflow-y-auto p-4 lg:p-6">
          <div id="content0" class="space-y-6">
            <h2 class="text-2xl lg:text-3xl font-semibold">
              Welcome back •
              <span class="text-emerald-400 text-base"
                >Last intent: 8s • Gas -62%</span
              >
            </h2>

            <!-- STATS - responsive grid -->
            <div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-5 gap-4">
              <div class="glass p-4 rounded-2xl border border-zinc-700">
                <div class="text-zinc-400 text-xs">TVL (sim)</div>
                <div class="text-2xl lg:text-4xl font-bold">
                  $142,837
                  <span class="text-emerald-400 text-sm lg:text-xl">↑4.2%</span>
                </div>
              </div>
              <div class="glass p-4 rounded-2xl border border-zinc-700">
                <div class="text-emerald-400 text-xs">APY AVG</div>
                <div class="text-2xl lg:text-4xl font-bold">18.7%</div>
              </div>
              <!-- ... more stat cards ... -->
            </div>

            <!-- PORTFOLIO + SWAP - stack on mobile, side-by-side on larger -->
            <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
              <div class="lg:col-span-7 glass rounded-3xl p-5">
                <h3 class="font-semibold mb-4">Portfolio Value</h3>
                <canvas
                  id="portfolioChart"
                  class="w-full"
                  height="100"
                ></canvas>
              </div>
              <div class="lg:col-span-5 glass rounded-3xl p-5">
                <h3 class="font-semibold mb-3">Quick Swap</h3>
                <div class="flex flex-col sm:flex-row gap-3">
                  <select class="flex-1 bg-zinc-800 p-3 rounded-2xl">
                    ETH • 1.284
                  </select>
                  <div class="self-center text-xl hidden sm:block">→</div>
                  <select class="flex-1 bg-zinc-800 p-3 rounded-2xl">
                    USDC • 3,284
                  </select>
                </div>
                <button
                  onclick="executeSwap()"
                  class="w-full mt-4 py-4 bg-gradient-to-r from-fuchsia-500 to-violet-500 rounded-3xl font-bold"
                >
                  EXECUTE SWAP
                </button>
              </div>
            </div>

            <!-- More sections with responsive grids -->
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
              <!-- Staking, Activity, Trust sections -->
            </div>
          </div>

          <!-- Other tab contents hidden by default -->
          <div id="content1" class="hidden">
            Swap / Bridge content (expand here)
          </div>
          <!-- ... etc. ... -->
        </main>
      </div>
    </div>

    <script>
      // Mobile menu toggle
      const mobileBtn = document.getElementById("mobile-menu-btn");
      const closeBtn = document.getElementById("close-sidebar");
      const sidebar = document.getElementById("sidebar");

      mobileBtn?.addEventListener("click", () => {
        sidebar.classList.remove("-translate-x-full");
      });

      closeBtn?.addEventListener("click", () => {
        sidebar.classList.add("-translate-x-full");
      });

      // Close sidebar when clicking outside on mobile
      document.addEventListener("click", (e) => {
        if (
          window.innerWidth < 1024 &&
          !sidebar.contains(e.target) &&
          !mobileBtn.contains(e.target)
        ) {
          sidebar.classList.add("-translate-x-full");
        }
      });

      // Tab switching
      function switchTab(n) {
        document
          .querySelectorAll('[id^="content"]')
          .forEach((el) => el.classList.add("hidden"));
        document.getElementById("content" + n)?.classList.remove("hidden");

        document.querySelectorAll(".tab-btn").forEach((b) => {
          b.classList.remove("border-b-2", "border-violet-500", "font-medium");
          b.classList.add("text-zinc-400");
        });
        document
          .getElementById("tab" + n)
          ?.classList.add("border-b-2", "border-violet-500", "font-medium");
        document.getElementById("tab" + n)?.classList.remove("text-zinc-400");

        // Close mobile sidebar after selection
        if (window.innerWidth < 1024) {
          sidebar.classList.add("-translate-x-full");
        }
      }

      // Chart init (responsive by default via canvas)
      function initChart() {
        const ctx = document.getElementById("portfolioChart");
        if (!ctx) return;
        new Chart(ctx.getContext("2d"), {
          type: "line",
          data: {
            labels: ["Mar 1", "Mar 8", "Mar 15", "Mar 20"],
            datasets: [
              {
                label: "TVL $",
                data: [82000, 112000, 139000, 142837],
                borderColor: "#c084fc",
                tension: 0.4,
              },
            ],
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            scales: { y: { grid: { color: "#3b82f6" } } },
          },
        });
      }

      // Wallet connect simulation
      function connectWallet() {
        document.getElementById("wallet-btn").textContent =
          "0x7f9a... Connected";
        alert("Wallet connected!");
      }

      // Execute swap demo
      function executeSwap() {
        alert("Swap executed successfully!");
      }

      // Init
      window.addEventListener("load", () => {
        initChart();
        switchTab(0); // default tab
      });

      // Resize handling (optional - chart already responsive)
      window.addEventListener("resize", () => {
        // Can add more logic here if needed
      });
    </script>
  </body>
</html>
